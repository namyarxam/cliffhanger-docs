<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Cliffhanger</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#131520">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #131520;
      --bg-card: #181a2a;
      --text: #e8e6e3;
      --text-dim: rgba(255,255,255,0.62);
      --text-faint: rgba(255,255,255,0.35);
      --accent: #ff6b35;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 400;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 32px 24px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
      display: inline-block;
      padding-bottom: 24px;
    }
    .logo:hover { text-decoration: none; }
    .logo-accent {
      color: var(--accent);
    }
    main {
      flex: 1;
      max-width: 880px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 28px 48px;
    }
    h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin: 8px 0 24px;
      line-height: 1.15;
    }
    h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin: 44px 0 14px;
      color: var(--text);
    }
    h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 28px 0 10px;
      color: var(--text);
    }
    p {
      color: var(--text-dim);
      margin: 0 0 18px;
      font-size: 16px;
    }
    strong { color: var(--text); font-weight: 600; }
    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }
    a:hover {
      border-bottom-color: var(--accent);
    }
    hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }
    ul, ol {
      color: var(--text-dim);
      padding-left: 24px;
      margin: 0 0 18px;
    }
    li {
      margin-bottom: 6px;
    }
    code {
      background: var(--bg-card);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.92em;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      color: var(--text);
    }
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 16px;
      margin: 16px 0;
      color: var(--text-dim);
    }
    footer {
      padding: 32px 24px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }
    .logo-hero {
      text-align: center;
      margin: 8px 0 32px;
    }
    .logo-hero img {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(255,107,53,0.15), 0 8px 24px rgba(0,0,0,0.4);
      display: inline-block;
    }
    .hero {
      text-align: center;
      margin: 8px 0 56px;
    }
    .hero-tagline {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin: 8px 0 16px;
      color: var(--text);
    }
    .hero-subtitle {
      font-size: 17px;
      color: var(--text-dim);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.5;
    }
    .app-store-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 10px 20px 10px 16px;
      background: #000;
      color: #fff;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.18);
      text-decoration: none;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .app-store-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    .app-store-icon {
      width: 26px;
      height: 26px;
      color: #fff;
    }
    .app-store-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
      text-align: left;
    }
    .app-store-text-small {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4px;
      opacity: 0.8;
    }
    .app-store-text-large {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    /* Phone showcase */
    .phone-showcase {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin: 56px 0 64px;
      padding: 0;
    }
    .phone-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .iphone-frame {
      width: 100%;
      max-width: 220px;
      aspect-ratio: 9 / 19.5;
      background: #0a0a0a;
      border-radius: 32px;
      padding: 9px;
      position: relative;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.55),
        0 12px 28px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    }
    /* Dynamic Island */
    .iphone-frame::before {
      content: '';
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      width: 28%;
      height: 22px;
      background: #000;
      border-radius: 12px;
      z-index: 2;
    }
    .iphone-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
      display: block;
      background: var(--bg-card);
    }
    .phone-caption {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      text-align: center;
      margin: 0;
      padding: 0 4px;
      line-height: 1.4;
    }
    /* Secondary 'More features' section — contained card with bg shift */
    .secondary-section {
      background: var(--bg-card);
      padding: 56px 32px 48px;
      margin: 48px 0 56px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .secondary-eyebrow {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--text-faint);
      margin: 0 0 36px;
    }
    .secondary-showcase {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 36px;
      max-width: 500px;
      margin: 0 auto;
    }
    @media (max-width: 720px) {
      .phone-showcase {
        grid-template-columns: 1fr;
        gap: 44px;
        max-width: 280px;
        margin: 40px auto 48px;
      }
      .secondary-showcase {
        grid-template-columns: 1fr;
        gap: 44px;
        max-width: 280px;
      }
      .iphone-frame {
        max-width: 240px;
        margin: 0 auto;
      }
      .secondary-section {
        padding: 40px 20px 32px;
        margin: 32px 0 40px;
      }
    }
    @media (max-width: 640px) {
      h1 { font-size: 28px; }
      main { padding: 16px 20px 32px; }
      .logo-hero img { width: 104px; height: 104px; border-radius: 22px; }
      .hero-tagline { font-size: 28px; }
      .hero-subtitle { font-size: 15px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="logo">cliff<span class="logo-accent">hanger</span></a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; Cliffhanger
  </footer>
</body>
</html>
